<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create account - VideoNow</title>
<link rel="icon" href="assets/logo.png">
<link rel="stylesheet" href="css/main.css">
</head>
<body data-page="register">

<header id="header">
  <a href="index.html" id="logo"><img src="assets/logo.png" alt="VideoNow"></a>
  <div id="header-right" style="margin-left:auto;">
    <a href="login.html">Sign in</a>
  </div>
</header>

<nav id="navbar"></nav>

<div id="auth-shell">
  <div class="auth-box">
    <div class="auth-logo"><img src="assets/logo.png" alt="VideoNow"></div>
    <h2>Create account</h2>
    <p class="auth-tagline">Join VideoNow today</p>

    <div class="age-notice">⚠️ You must be 13 years or older to create an account on VideoNow.</div>

    <form id="register-form" onsubmit="submitRegister(event)">
      <div class="form-group">
        <label for="reg-name">Name</label>
        <input type="text" id="reg-name" placeholder="Your name" required minlength="2" maxlength="50" autocomplete="name">
      </div>
      <div class="form-group">
        <label for="reg-email">Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" required maxlength="254" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" placeholder="Min. 8 characters" required minlength="8" maxlength="128" autocomplete="new-password">
        <small>Usa al menos 8 caracteres, combina letras y números.</small>
      </div>
      <div class="form-group">
        <label for="reg-dob">Date of birth</label>
        <input type="date" id="reg-dob" required autocomplete="bday">
        <small>You must be 13 or older to use VideoNow.</small>
      </div>
      <div class="form-group checkbox">
        <input type="checkbox" id="reg-agree" required>
        <label for="reg-agree">
          I agree to the <a href="terms.html">Terms of Service</a> and <a href="privacy.html">Privacy Policy</a>, including cookie usage. I confirm I am 13 or older.
        </label>
      </div>
      <button type="submit" class="btn-submit">Create account</button>
    </form>
    <p class="security-note">🔒 Protected by rate limiting &amp; GDPR-compliant</p>
    <div class="auth-switch">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>
</div>

<div id="toast" role="status" aria-live="polite"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-init.js"></script>
<script src="js/security.js"></script>
<script src="js/data.js"></script>
<script src="js/layout.js"></script>
<script>
// Bloquear fechas que indiquen menos de 13 años directamente en el input
(function() {
  const d = document.getElementById('reg-dob');
  const maxDate = new Date();
  maxDate.setFullYear(maxDate.getFullYear() - 13);
  d.max = maxDate.toISOString().split('T')[0];
  const minDate = new Date();
  minDate.setFullYear(minDate.getFullYear() - 120);
  d.min = minDate.toISOString().split('T')[0];
})();

async function submitRegister(e) {
  e.preventDefault();
  if (!RateLimiter.check('register', 3, 60000)) {
    showToast('Demasiados intentos. Espera un momento.');
    return;
  }

  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const dob = document.getElementById('reg-dob').value;
  const agreed = document.getElementById('reg-agree').checked;

  if (name.length < 2) { showToast('Nombre demasiado corto'); return; }
  if (!isValidEmail(email)) { showToast('Email no válido'); return; }
  if (password.length < 8) { showToast('La contraseña debe tener al menos 8 caracteres'); return; }
  if (!dob) { showToast('Ingresa tu fecha de nacimiento'); return; }
  if (!isOldEnough(dob, 13)) { showToast('Debes tener 13 años o más para registrarte.'); return; }
  if (!agreed) { showToast('Debes aceptar los Términos y la Política de Privacidad'); return; }

  showToast('Creando tu cuenta…');
  try {
    const { data, error } = await supabase.auth.signUp({
      email,
      password,
      options: {
        data: {
          name,
          dob
        }
      }
    });

    if (error) {
      showToast('Error: ' + error.message);
      console.error('Signup error:', error);
      return;
    }

    console.log('✅ Cuenta creada:', data.user?.email);
    showToast('¡Revisa tu email para confirmar tu cuenta!');
    setTimeout(() => window.location.href = 'login.html', 1200);
  } catch (err) {
    showToast('Error de conexión');
    console.error('Exception:', err);
  }
}
</script>
</body>
</html>
