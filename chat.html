<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chats - VideoNow</title>
<link rel="icon" href="assets/logo.png">
<link rel="stylesheet" href="css/main.css">
</head>
<body data-page="chat">

<header id="header">
  <a href="index.html" id="logo"><img src="assets/logo.png" alt="VideoNow"></a>
  <form id="search-form" action="search.html" role="search">
    <div id="search-wrap">
      <input type="text" id="search-input" name="q" placeholder="Buscar" autocomplete="off" maxlength="200" aria-label="Buscar en VideoNow">
      <button type="submit" id="search-btn" aria-label="Buscar">
        <svg viewBox="0 0 24 24"><path d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" stroke="#555" stroke-width="2.5" fill="none" stroke-linecap="round"/></svg>
      </button>
    </div>
  </form>
  <div id="header-right">
    <a href="browse.html">Explorar</a>
    <span class="hdr-sep">|</span>
    <a href="movies.html">Películas</a>
    <span class="hdr-sep">|</span>
    <span id="header-auth-slot" style="display:flex;align-items:center;gap:14px;"></span>
  </div>
</header>

<nav id="navbar">
  <a href="index.html" class="nav-item" data-nav="home">Videos</a>
  <a href="music.html" class="nav-item" data-nav="music">Música</a>
  <a href="movies.html" class="nav-item" data-nav="movies">Películas</a>
  <a href="shows.html" class="nav-item" data-nav="shows">Series</a>
  <a href="live.html" class="nav-item" data-nav="live">En directo</a>
  <a href="chat.html" class="nav-item" data-nav="chat">Chats</a>
</nav>

<div class="content-offset-chat">
  <div class="chat-layout">
    <div class="chat-rooms-panel" id="chat-rooms-panel">
      <div class="crp-header">Salas de chat</div>
      <div id="chat-room-list"></div>
    </div>
    <div class="chat-main">
      <div class="chat-header">
        <div>
          <div class="chat-room-name" id="chat-active-room-name">General</div>
          <div class="chat-room-meta" id="chat-active-room-meta"></div>
        </div>
      </div>
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-bar">
        <textarea id="chat-input" placeholder="Escribe un mensaje…" maxlength="1000" onkeydown="onChatKeydown(event)"></textarea>
        <button class="chat-send-btn" onclick="sendChatMessage()">Enviar</button>
      </div>
    </div>
  </div>
</div>

<div id="toast" role="status" aria-live="polite"></div>

<script src="js/auth.js"></script>
<script src="js/data.js"></script>
<script src="js/notifications.js"></script>
<script src="js/comments.js"></script>
<script src="js/playlists.js"></script>
<script src="js/interactions.js"></script>
<script src="js/upload.js"></script>
<script src="js/security.js"></script>
<script src="js/layout.js"></script>
<script>
let activeRoom = 'general';

function renderRoomList() {
  const list = document.getElementById('chat-room-list');
  list.innerHTML = CHAT_ROOMS.map(r => `
    <div class="chat-room-item ${r.id === activeRoom ? 'active' : ''}" onclick="switchRoom('${r.id}')">
      <span class="chat-room-dot"></span>
      <div style="min-width:0;flex:1;">
        <div style="font-size:13px;${r.id===activeRoom?'font-weight:bold;':''}overflow:hidden;text-overflow:ellipsis;">${sanitize(r.name)}</div>
        <div style="font-size:11px;color:#999;">${r.online} en línea</div>
      </div>
    </div>`).join('');
}

function switchRoom(roomId) {
  activeRoom = roomId;
  const room = CHAT_ROOMS.find(r => r.id === roomId);
  document.getElementById('chat-active-room-name').textContent = room.name;
  document.getElementById('chat-active-room-meta').textContent = room.online + ' usuarios en línea';
  renderRoomList();
  renderMessages();
}

function renderMessages() {
  const msgs = getChatMessages(activeRoom);
  const box = document.getElementById('chat-messages');
  if (!msgs.length) {
    box.innerHTML = '<p class="text-muted" style="text-align:center;padding:20px;">No hay mensajes todavía. ¡Sé el primero en escribir!</p>';
    return;
  }
  box.innerHTML = msgs.map(m => `
    <div class="chat-msg">
      <div class="chat-msg-av">${sanitize(m.author.charAt(0).toUpperCase())}</div>
      <div class="chat-msg-body">
        <span class="chat-msg-author">${sanitize(m.author)}</span><span class="chat-msg-time">${sanitize(m.time)}</span>
        <div class="chat-msg-text">${sanitize(m.text, 1000)}</div>
      </div>
    </div>`).join('');
  box.scrollTop = box.scrollHeight;
}

function onChatKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendChatMessage();
  }
}

function sendChatMessage() {
  if (!requireAuth(null, 'Inicia sesión para chatear')) return;
  if (!RateLimiter.check('chatmsg', 15, 30000)) {
    showToast('Estás enviando mensajes muy rápido — espera un poco');
    return;
  }
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  if (text.length > 1000) { showToast('Mensaje demasiado largo'); return; }

  if (!CHAT_MESSAGES[activeRoom]) CHAT_MESSAGES[activeRoom] = [];
  const now = new Date();
  CHAT_MESSAGES[activeRoom].push({
    author: Auth.user.name || 'Tú',
    text: text,
    time: now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0')
  });
  input.value = '';
  renderMessages();
}

renderRoomList();
switchRoom('general');
</script>
</body>
</html>
