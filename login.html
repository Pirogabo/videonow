<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar sesión - VideoNow</title>
<link rel="icon" href="assets/logo.png">
<link rel="stylesheet" href="css/main.css">
</head>
<body data-page="login">

<header id="header">
  <a href="index.html" id="logo"><img src="assets/logo.png" alt="VideoNow"></a>
  <div id="header-right" style="margin-left:auto;">
    <a href="register.html">Crear cuenta</a>
  </div>
</header>

<nav id="navbar"></nav>

<div id="auth-shell">
  <div class="auth-box">
    <div class="auth-logo"><img src="assets/logo.png" alt="VideoNow"></div>
    <h2>Iniciar sesión</h2>
    <p class="auth-tagline">Bienvenido de nuevo a VideoNow</p>

    <button class="btn-oauth" onclick="oauthLogin('google')">
      <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Continuar con Google
    </button>
    <button class="btn-oauth" onclick="oauthLogin('facebook')">
      <svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" fill="#1877F2"/></svg>
      Continuar con Facebook
    </button>

    <div class="divider">o</div>

    <form id="login-form" onsubmit="submitLogin(event)">
      <div class="form-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="tu@ejemplo.com" required maxlength="254" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="login-password">Contraseña</label>
        <input type="password" id="login-password" placeholder="Contraseña" required maxlength="128" autocomplete="current-password">
      </div>
      <button type="submit" class="btn-submit">Iniciar sesión</button>
    </form>
    <p class="security-note">🔒 Protegido con límite de intentos y autenticación segura</p>
    <div class="auth-switch">
      ¿No tienes cuenta? <a href="register.html">Regístrate</a>
      &nbsp;·&nbsp; <a href="#" onclick="forgotPassword(event)">¿Olvidaste tu contraseña?</a>
    </div>
  </div>
</div>

<div id="toast" role="status" aria-live="polite"></div>

<!-- Orden importante: env (claves) → librería Supabase → init propio → fallback local → resto -->
<script src="js/env.js" onerror="console.warn('[VideoNow] js/env.js no encontrado — copia js/env.example.js y configura tus claves, o despliega en Vercel con las Environment Variables puestas.')"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-init.js"></script>
<script src="js/auth.js"></script>
<script src="js/data.js"></script>
<script src="js/notifications.js"></script>
<script src="js/comments.js"></script>
<script src="js/playlists.js"></script>
<script src="js/interactions.js"></script>
<script src="js/upload.js"></script>
<script src="js/security.js"></script>
<script src="js/layout.js"></script>
<script>
async function submitLogin(e) {
  e.preventDefault();
  if (!RateLimiter.check('login', 5, 60000)) {
    showToast('Demasiados intentos. Espera un momento.');
    return;
  }
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;

  if (!isValidEmail(email)) { showToast('Email no válido'); return; }
  if (!password) { showToast('Ingresa tu contraseña'); return; }

  const submitBtn = document.querySelector('#login-form button[type="submit"]');
  submitBtn.disabled = true;
  showToast('Conectando…');

  if (isSupabaseReady()) {
    // Camino real: Supabase Auth
    const { data, error } = await VN_SUPABASE.auth.signInWithPassword({ email, password });
    submitBtn.disabled = false;
    if (error) { showToast('Error: ' + error.message); return; }
    showToast('¡Sesión iniciada!');
    setTimeout(() => window.location.href = 'index.html', 500);
  } else {
    // Camino local: sistema de localStorage (js/auth.js) — funciona sin backend
    const result = Auth.login(email, password);
    submitBtn.disabled = false;
    if (!result.ok) { showToast(result.error); return; }
    showToast('¡Sesión iniciada!');
    setTimeout(() => window.location.href = 'index.html', 500);
  }
}

function oauthLogin(provider) {
  if (!RateLimiter.check('oauth_' + provider, 3, 30000)) {
    showToast('Demasiados intentos. Espera un momento.');
    return;
  }
  if (isSupabaseReady()) {
    VN_SUPABASE.auth.signInWithOAuth({ provider });
  } else {
    showToast('Conecta Supabase (ver SETUP.md) para usar inicio de sesión con ' + provider + '.');
  }
}

async function forgotPassword(e) {
  e.preventDefault();
  const email = document.getElementById('login-email').value.trim();
  if (!isValidEmail(email)) { showToast('Ingresa tu email primero'); return; }
  if (!RateLimiter.check('forgot', 2, 120000)) { showToast('Espera antes de volver a solicitar'); return; }

  if (isSupabaseReady()) {
    const { error } = await VN_SUPABASE.auth.resetPasswordForEmail(email);
    showToast(error ? 'Error: ' + error.message : 'Email de recuperación enviado');
  } else {
    showToast('Conecta Supabase (ver SETUP.md) para recuperar contraseña por email.');
  }
}
</script>
</body>
</html>
